<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CFIM & CRFIM - Guest pass generator</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<br>
<div class="container">
    <div class="panel panel-default">
        <div class="panel-heading"><strong>CFIM - CRFIM</strong> <small> (Guest pass generator)</small></div>
        <div class="panel-body">

        <!-- Standar Form -->
        <h4>Select files from your computer</h4>
        <form action="" method="post" enctype="multipart/form-data" id="js-upload-form">
            <div class="form-inline">
                <div class="form-group">
                    <input type="file" name="files[]" id="js-upload-files" multiple>
                </div>
                <button type="submit" class="btn btn-sm btn-primary" id="js-upload-submit">Upload files</button>
            </div>
        </form>

        <!-- Drop Zone -->
        <h4>Or drag and drop files below</h4>
        <div class="upload-drop-zone" id="drop-zone">
            Just drag and drop files here
        </div>

        <!-- Progress Bar -->
        <h3 class="status-text" style="display: none;">Processing...</h3>

        <div class="progress" style="display: none;">
            <div class="progress-bar" role="progressbar" aria-valuenow="0 aria-valuemin="0" aria-valuemax="100" style="width: 0;">
                <span class="sr-only">60% Complete</span>
            </div>
        </div>

        <!-- Upload Finished -->
        <div class="js-upload-finished" style="display: none;">
            <h3>Processed files</h3>
            <div class="list-group">
                <!--
                <a href="#" class="list-group-item list-group-item-success"><span class="badge alert-success pull-right">Success</span>image-01.jpg</a>
                -->
            </div>
        </div>
    </div>
</div>
<div class="container" id="content">
</div>

<script src="js/jquery-3.2.1.js"></script>
<script src="js/bootstrap.js"></script>
<script src="js/jspdf.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
